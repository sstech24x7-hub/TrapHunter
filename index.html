<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrapHunter | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 90%; max-width: 450px;
            border: 1px solid #334155;
        }
        h2 { color: #fbbf24; margin-bottom: 1.5rem; font-size: 1.6rem; text-align: center; letter-spacing: 2px; font-weight: 800; }
        label { display: block; margin-bottom: 0.6rem; font-size: 0.9rem; color: #94a3b8; font-weight: 600; }
        input, select {
            width: 100%; padding: 0.8rem; margin-bottom: 1.5rem;
            background: #0f172a; border: 1px solid #475569;
            border-radius: 0.7rem; color: white; outline: none; font-size: 1rem;
        }
        input:focus { border-color: #fbbf24; }
        button {
            width: 100%; padding: 0.9rem; background: #fbbf24;
            color: #0f172a; border: none; border-radius: 0.7rem;
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase;
        }
        button:hover { background: #f59e0b; transform: translateY(-2px); }
        #status { margin-top: 1.2rem; text-align: center; font-size: 0.95rem; font-weight: 500; min-height: 1.5rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body onload="loadSettings()">

<div class="container">
    <h2>TRAP ADMIN</h2>
    
    <label>Access Token</label>
    <input type="text" id="tokenInput" placeholder="Fetching current token...">
    
    <label>System Mode</label>
    <select id="modeSelect">
        <option value="true">DEMO (Testing Mode)</option>
        <option value="false">REAL (Live Market)</option>
    </select>
    
    <button onclick="handleUpdate()" id="saveBtn">UPDATE SETTINGS</button>
    <p id="status"></p>
</div>

<script>
    const SB_URL = "https://gzpreidjzzswzeipuluv.supabase.co";
    const SB_KEY = "sb_publishable_7xpiWUCAZ_C0jojpz7ogDQ_IufROnjX";
    const sbClient = supabase.createClient(SB_URL, SB_KEY);

    // --- Page Load hote hi Database se Data uthayega ---
    async function loadSettings() {
        const statusMsg = document.getElementById('status');
        try {
            const { data, error } = await sbClient
                .from('settings')
                .select('*')
                .eq('id', 1)
                .single();

            if (data) {
                document.getElementById('tokenInput').value = data.access_token || "";
                document.getElementById('modeSelect').value = data.is_test_mode.toString();
                statusMsg.innerHTML = "<span class='success'>✅ Current Settings Loaded</span>";
            }
        } catch (err) {
            console.error("Load error:", err);
        }
    }

    // --- Data Update karne ke liye ---
    async function handleUpdate() {
        const btn = document.getElementById('saveBtn');
        const statusMsg = document.getElementById('status');
        const tokenVal = document.getElementById('tokenInput').value;
        const isTestVal = document.getElementById('modeSelect').value === "true";

        btn.disabled = true;
        btn.innerText = "UPDATING...";

        try {
            const { error } = await sbClient
                .from('settings')
                .update({ 
                    access_token: tokenVal, 
                    is_test_mode: isTestVal,
                    updated_at: new Date().toISOString() 
                })
                .eq('id', 1);

            if (error) throw error;
            statusMsg.innerHTML = "<span class='success'>✅ Settings Saved & Syncing...</span>";
        } catch (err) {
            statusMsg.innerHTML = `<span class='error'>❌ Error: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "UPDATE SETTINGS";
        }
    }
</script>

</body>
</html>
