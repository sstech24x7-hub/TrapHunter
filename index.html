<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrapHunter | Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%; max-width: 400px;
            border: 1px solid #334155;
        }
        h2 { color: #fbbf24; margin-bottom: 1.5rem; font-size: 1.5rem; text-align: center; letter-spacing: 1px; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        input, select {
            width: 100%; padding: 0.75rem; margin-bottom: 1.25rem;
            background: #0f172a; border: 1px solid #334155;
            border-radius: 0.5rem; color: white; outline: none;
        }
        input:focus { border-color: #fbbf24; }
        button {
            width: 100%; padding: 0.75rem; background: #fbbf24;
            color: #0f172a; border: none; border-radius: 0.5rem;
            font-weight: bold; font-size: 1rem; cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #f59e0b; transform: translateY(-2px); }
        #status { margin-top: 1rem; text-align: center; font-size: 0.875rem; min-height: 1.25rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRAP ADMIN</h2>
    
    <label>Dhan Access Token</label>
    <input type="text" id="token" placeholder="Paste eyJ... token here">
    
    <label>System Mode</label>
    <select id="mode">
        <option value="true">DEMO (Testing Mode)</option>
        <option value="false">REAL (Live Market)</option>
    </select>
    
    <button onclick="saveSettings()" id="saveBtn">UPDATE SETTINGS</button>
    <p id="status"></p>
</div>

<script>
    // Supabase Configuration
    const SB_URL = "https://gzpreidjzzswzeipuluv.supabase.co";
    const SB_KEY = "sb_publishable_7xpiWUCAZ_C0jojpz7ogDQ_IufROnjX";
    const { createClient } = supabase;
    const _supabase = createClient(SB_URL, SB_KEY);

    async function saveSettings() {
        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('status');
        const tokenValue = document.getElementById('token').value;
        const modeValue = document.getElementById('mode').value === "true";

        if (!tokenValue) {
            status.innerHTML = "<span class='error'>Token cannot be empty!</span>";
            return;
        }

        btn.disabled = true;
        btn.innerText = "SAVING...";
        status.innerText = "";

        try {
            const { error } = await _supabase
                .from('settings')
                .update({ 
                    access_token: tokenValue, 
                    is_test_mode: modeValue,
                    updated_at: new Date().toISOString() 
                })
                .eq('id', 1);

            if (error) throw error;

            status.innerHTML = "<span class='success'>✅ Settings Saved Successfully!</span>";
        } catch (err) {
            console.error(err);
            status.innerHTML = `<span class='error'>❌ Error: ${err.message}</span>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "UPDATE SETTINGS";
        }
    }
</script>

</body>
</html>
